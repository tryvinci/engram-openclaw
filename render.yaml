services:
  - type: web
    name: openclaw
    runtime: docker
    plan: starter
    dockerfilePath: apps/engram-openclaw/Dockerfile
    dockerContext: apps/engram-openclaw
    dockerCommand: node openclaw.mjs gateway --allow-unconfigured --bind lan --port 8080
    healthCheckPath: /health
    envVars:
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
